# Shulang CI: multi-platform build, C test suite, and self-host (.su) tests
# 全平台统一跑 tests/run-ci-full-suite.sh；仅 freestanding/DOD perf/io_uring 等按宿主在脚本内分支。

name: CI

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ dev,main ]

jobs:
  linux:
    name: Linux (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    env:
      CI: "1"
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-22.04, ubuntu-latest ]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install dependencies (liburing, zlib, brotli for std/io and std/compress)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq liburing-dev zlib1g-dev libbrotli-dev strace curl xz-utils
      - name: Show job env (debug)
        run: |
          echo "Runner OS: $RUNNER_OS | ${{ matrix.os }}"
          uname -a
          pwd && ls -la
          which cc make 2>/dev/null || true
      - name: Build compiler (shu)
        run: make -C compiler OPT=1 all
        env:
          CC: cc
      - name: Verify compiler/shu was built
        run: |
          if [ ! -f compiler/shu ] || [ ! -x compiler/shu ]; then
            echo "::error::compiler/shu not found or not executable (Build compiler step did not produce it)"
            exit 1
          fi
          if [ ! -f compiler/shu-c ] || [ ! -x compiler/shu-c ]; then
            echo "::error::compiler/shu-c not found (make all should produce shu-c alongside shu)"
            exit 1
          fi
      - name: Full CI test suite
        run: |
          chmod +x tests/run-ci-full-suite.sh
          ./tests/run-ci-full-suite.sh
        timeout-minutes: 170
      - name: Dump failure logs (on failure)
        if: failure()
        run: |
          echo "=== build_bstrict.log (last 120 lines) ==="
          tail -120 /tmp/build_bstrict.log 2>/dev/null || true
          echo "=== run_shu1.log (last 200 lines) ==="
          tail -200 /tmp/run_shu1.log 2>/dev/null || true
          echo "=== run_shu2.log (last 200 lines) ==="
          tail -200 /tmp/run_shu2.log 2>/dev/null || true
          echo "=== Kept generated C (head 120 lines each) ==="
          for f in /tmp/shu_su.*.c; do
            [ -f "$f" ] || continue
            echo "--- $f ---" && head -120 "$f" && echo ""
          done

  linux-asm-smoke:
    name: Linux asm smoke (bootstrap-driver + run-asm)
    runs-on: ubuntu-latest
    env:
      CI: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install dependencies (liburing, zlib, brotli — 与主编译 job 对齐)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq liburing-dev zlib1g-dev libbrotli-dev strace
      - name: Build compiler (shu + shu-c)
        run: make -C compiler OPT=1 all
        env:
          CC: cc
      - name: Produce asm-capable shu (Goal 2)
        run: make -C compiler bootstrap-driver-seed
        env:
          CC: cc
        timeout-minutes: 12
      - name: Run asm regression script (forces CI path)
        run: SHU_CI_FORCE_ASM=1 ./tests/run-asm.sh
        timeout-minutes: 12
      - name: shu_asm smoke (return-value)
        run: |
          if [ ! -x compiler/shu_asm ]; then
            echo "shu_asm smoke SKIP (no shu_asm on asm-smoke job; full suite covers build_shu_asm)"
            exit 0
          fi
          cd compiler && ./scripts/run_shu_asm_smoke.sh
        timeout-minutes: 8

  linux-arm64:
    name: Linux (ARM64)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 180
    env:
      CI: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install dependencies (liburing, zlib, brotli for std/io and std/compress)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq liburing-dev zlib1g-dev libbrotli-dev strace curl xz-utils
      - name: Show job env (debug)
        run: |
          echo "Runner OS: $RUNNER_OS | Linux ARM64"
          uname -a && pwd && which cc make 2>/dev/null || true
      - name: Build compiler (shu)
        run: make -C compiler OPT=1 all
        env:
          CC: cc
      - name: Verify compiler/shu was built
        run: |
          if [ ! -f compiler/shu ] || [ ! -x compiler/shu ]; then
            echo "::error::compiler/shu not found or not executable (Build compiler step did not produce it)"
            exit 1
          fi
          if [ ! -f compiler/shu-c ] || [ ! -x compiler/shu-c ]; then
            echo "::error::compiler/shu-c not found (make all should produce shu-c alongside shu)"
            exit 1
          fi
      - name: Full CI test suite
        run: |
          chmod +x tests/run-ci-full-suite.sh
          ./tests/run-ci-full-suite.sh
        timeout-minutes: 170
      - name: Dump failure logs (on failure)
        if: failure()
        run: |
          tail -120 /tmp/build_bstrict.log 2>/dev/null || true
          tail -200 /tmp/run_shu1.log 2>/dev/null || true
          tail -200 /tmp/run_shu2.log 2>/dev/null || true
          for f in /tmp/shu_su.*.c; do [ -f "$f" ] || continue; echo "--- $f ---" && head -120 "$f"; done

  mac:
    name: macOS (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    env:
      CI: "1"
    strategy:
      fail-fast: false
      matrix:
        os: [ macos-14, macos-latest ]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install dependencies (brotli + zig for perf baseline)
        run: brew list brotli >/dev/null 2>&1 || brew install brotli; brew list zig >/dev/null 2>&1 || brew install zig
      - name: Show job env (debug)
        run: |
          echo "Runner OS: $RUNNER_OS | ${{ matrix.os }}"
          uname -a && pwd && which cc make 2>/dev/null || true
      - name: Build compiler (shu)
        run: make -C compiler OPT=1 all
        env:
          CC: cc
      - name: Verify compiler/shu was built
        run: |
          if [ ! -f compiler/shu ] || [ ! -x compiler/shu ]; then
            echo "::error::compiler/shu not found or not executable (Build compiler step did not produce it)"
            exit 1
          fi
          if [ ! -f compiler/shu-c ] || [ ! -x compiler/shu-c ]; then
            echo "::error::compiler/shu-c not found (make all should produce shu-c alongside shu)"
            exit 1
          fi
      - name: Full CI test suite
        run: |
          chmod +x tests/run-ci-full-suite.sh
          ./tests/run-ci-full-suite.sh
        timeout-minutes: 170
      - name: Dump failure logs (on failure)
        if: failure()
        run: |
          tail -120 /tmp/build_bstrict.log 2>/dev/null || true
          tail -200 /tmp/run_shu1.log 2>/dev/null || true
          tail -200 /tmp/run_shu2.log 2>/dev/null || true
          for f in /tmp/shu_su.*.c; do [ -f "$f" ] || continue; echo "--- $f ---" && head -120 "$f"; done

  windows:
    name: Windows (MSYS2)
    runs-on: windows-latest
    timeout-minutes: 180
    env:
      CI: "1"
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Show job env (debug)
        run: |
          echo "Runner OS: $env:RUNNER_OS | Job: Windows"
          Get-Location
        shell: pwsh
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MSYS
          update: false
          install: make gcc diffutils python3 sed gawk zlib-devel brotli curl unzip
      - name: Build compiler (shu)
        run: make -C compiler OPT=1 all
        env:
          CC: gcc
      - name: Verify compiler/shu was built
        run: |
          if [ ! -f compiler/shu ] || [ ! -x compiler/shu ]; then
            echo "::error::compiler/shu not found or not executable (Build compiler step did not produce it)"
            exit 1
          fi
          if [ ! -f compiler/shu-c ] || [ ! -x compiler/shu-c ]; then
            echo "::error::compiler/shu-c not found (make all should produce shu-c alongside shu)"
            exit 1
          fi
      - name: Full CI test suite
        run: |
          chmod +x tests/run-ci-full-suite.sh
          ./tests/run-ci-full-suite.sh
        env:
          SHU_CI_SKIP_HEAVY: "1"
        timeout-minutes: 45
      - name: Dump failure logs (on failure)
        if: failure()
        run: |
          echo "=== run_shu1.log (last 200 lines) ==="
          tail -200 /tmp/run_shu1.log 2>/dev/null || true
          echo "=== run_shu2.log (last 200 lines) ==="
          tail -200 /tmp/run_shu2.log 2>/dev/null || true
          for f in /tmp/shu_su.*.c; do [ -f "$f" ] || continue; echo "--- $f ---" && head -120 "$f"; done

  linux-option-asan:
    name: Linux (ASan repro run-option)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq liburing-dev zlib1g-dev libbrotli-dev strace
      - name: Build std .o and shu (no ASan)
        run: make -C compiler clean && make -C compiler all
        env:
          CC: cc
      - name: Rebuild only compiler with ASan
        run: |
          rm -f compiler/src/main.o compiler/src/runtime.o compiler/src/preprocess.o \
            compiler/src/lexer/lexer.o compiler/src/ast/ast.o compiler/src/parser/parser.o \
            compiler/src/typeck/typeck.o compiler/src/codegen/codegen.o
          make -C compiler all \
            CFLAGS="-Wall -Wextra -I. -Iinclude -Isrc -O0 -g -fsanitize=address,undefined -fno-omit-frame-pointer"
        env:
          CC: cc
      - name: Reproduce run-option (capture ASan output)
        run: |
          ulimit -s 16384 2>/dev/null || true
          ./compiler/shu -L . tests/option/main.su -o /tmp/shu_option 2>&1 || true
          echo "--- exit code above ---"

  docker-distro:
    name: Docker (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [ alpine:3.23, debian:bookworm-slim ]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Show job env (debug)
        run: |
          echo "Job: Docker ${{ matrix.image }}"
          uname -a
          pwd
      - name: Build and full test in ${{ matrix.image }}
        timeout-minutes: 180
        run: |
          docker run --rm -e CI=1 -e SHU_CI_FULL_SUITE=1 -e SHU_CI_DOCKER=1 -e SHU_CC_EXTRA="-std=gnu11" \
            -v "${{ github.workspace }}:/src" -w /src \
            ${{ matrix.image }} \
            sh -c '
              if command -v apk >/dev/null 2>&1; then
                apk add --no-cache build-base bash diffutils python3 gawk perl linux-headers liburing-dev zlib-dev brotli-dev curl xz zig file
              else
                apt-get update -qq && apt-get install -y -qq build-essential bash diffutils python3 perl file liburing-dev zlib1g-dev libbrotli-dev curl xz-utils
              fi &&
              export SHU_CC_EXTRA="-std=gnu11" &&
              make -C compiler clean &&
              make -C compiler OPT=1 all &&
              chmod +x tests/run-ci-full-suite.sh &&
              ./tests/run-ci-full-suite.sh
            '
