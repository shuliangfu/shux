# Shux CI: multi-platform build, C test suite, and self-host (.x) tests
# 全平台统一跑 tests/run-ci-full-suite.sh（Tier P 便携 + Tier B DOD/IO + Tier A asm/bstrict 按平台）。
#
# TEMP: push/PR 自动 CI 已暂停（bootstrap-gold 调试中）；gold 绿后恢复 on 块注释。
# 手动触发：Actions → CI → Run workflow

name: CI

on:
  workflow_dispatch:
  # push:
  #   branches: [ dev ]
  # pull_request:
  #   branches: [ dev,main ]

jobs:
  linux:
    name: Linux (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    env:
      CI: "1"
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-22.04, ubuntu-latest ]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install dependencies (liburing, zlib, zstd, brotli for std/io and std/compress)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq liburing-dev zlib1g-dev libzstd-dev libbrotli-dev libsqlite3-dev strace curl xz-utils
      - name: Show job env (debug)
        run: |
          echo "Runner OS: $RUNNER_OS | ${{ matrix.os }}"
          uname -a
          pwd && ls -la
          which cc make 2>/dev/null || true
      - name: Build compiler (shux)
        run: make -C compiler OPT=1 all
        env:
          CC: cc
      - name: Verify compiler/shux was built
        run: |
          if [ ! -f compiler/shux ] || [ ! -x compiler/shux ]; then
            echo "::error::compiler/shux not found or not executable (Build compiler step did not produce it)"
            exit 1
          fi
          if [ ! -f compiler/shux-c ] || [ ! -x compiler/shux-c ]; then
            echo "::error::compiler/shux-c not found (make all should produce shux-c alongside shux)"
            exit 1
          fi
      - name: Full CI test suite
        run: |
          chmod +x tests/run-ci-full-suite.sh
          ./tests/run-ci-full-suite.sh
        timeout-minutes: 170
      - name: Dump failure logs (on failure)
        if: failure()
        run: |
          echo "=== build_bstrict.log (last 120 lines) ==="
          tail -120 /tmp/build_bstrict.log 2>/dev/null || true
          echo "=== run_shu1.log (last 200 lines) ==="
          tail -200 /tmp/run_shu1.log 2>/dev/null || true
          echo "=== run_shu2.log (last 200 lines) ==="
          tail -200 /tmp/run_shu2.log 2>/dev/null || true
          echo "=== Kept generated C (head 120 lines each) ==="
          for f in /tmp/shux_x.*.c; do
            [ -f "$f" ] || continue
            echo "--- $f ---" && head -120 "$f" && echo ""
          done

  linux-asm-smoke:
    name: Linux asm smoke (bootstrap-driver + run-asm)
    runs-on: ubuntu-latest
    env:
      CI: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install dependencies (liburing, zlib, brotli — 与主编译 job 对齐)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq liburing-dev zlib1g-dev libzstd-dev libbrotli-dev strace
      - name: Build compiler (shux + shux-c)
        run: make -C compiler OPT=1 all
        env:
          CC: cc
      - name: Produce asm-capable shux (Goal 2)
        run: make -C compiler bootstrap-driver-seed
        env:
          CC: cc
        timeout-minutes: 12
      - name: Run asm regression script (forces CI path)
        run: SHUX_CI_FORCE_ASM=1 ./tests/run-asm.sh
        timeout-minutes: 12
      - name: shux_asm smoke (return-value)
        run: |
          if [ ! -x compiler/shux_asm ]; then
            echo "shux_asm smoke SKIP (no shux_asm on asm-smoke job; full suite covers build_shux_asm)"
            exit 0
          fi
          cd compiler && ./scripts/run_shux_asm_smoke.sh
        timeout-minutes: 8

  linux-arm64:
    name: Linux (ARM64)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120
    env:
      CI: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install dependencies (liburing, zlib, zstd, brotli for std/io and std/compress)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq liburing-dev zlib1g-dev libzstd-dev libbrotli-dev libsqlite3-dev strace curl xz-utils
      - name: Show job env (debug)
        run: |
          echo "Runner OS: $RUNNER_OS | Linux ARM64"
          uname -a && pwd && which cc make 2>/dev/null || true
      - name: Build compiler (shux)
        run: make -C compiler OPT=1 all
        env:
          CC: cc
      - name: Verify compiler/shux was built
        run: |
          if [ ! -f compiler/shux ] || [ ! -x compiler/shux ]; then
            echo "::error::compiler/shux not found or not executable (Build compiler step did not produce it)"
            exit 1
          fi
          if [ ! -f compiler/shux-c ] || [ ! -x compiler/shux-c ]; then
            echo "::error::compiler/shux-c not found (make all should produce shux-c alongside shux)"
            exit 1
          fi
      - name: Full CI test suite
        run: |
          chmod +x tests/run-ci-full-suite.sh
          ./tests/run-ci-full-suite.sh
        timeout-minutes: 100
      - name: Dump failure logs (on failure)
        if: failure()
        run: |
          tail -120 /tmp/build_bstrict.log 2>/dev/null || true
          tail -200 /tmp/run_shu1.log 2>/dev/null || true
          tail -200 /tmp/run_shu2.log 2>/dev/null || true
          for f in /tmp/shux_x.*.c; do [ -f "$f" ] || continue; echo "--- $f ---" && head -120 "$f"; done

  mac:
    name: macOS (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    env:
      CI: "1"
    strategy:
      fail-fast: false
      matrix:
        os: [ macos-14, macos-latest ]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install dependencies (brotli + zig for perf baseline)
        run: brew list brotli >/dev/null 2>&1 || brew install brotli; brew list zig >/dev/null 2>&1 || brew install zig
      - name: Show job env (debug)
        run: |
          echo "Runner OS: $RUNNER_OS | ${{ matrix.os }}"
          uname -a && pwd && which cc make 2>/dev/null || true
      - name: Build compiler (shux)
        run: make -C compiler OPT=1 all
        env:
          CC: cc
      - name: Verify compiler/shux was built
        run: |
          if [ ! -f compiler/shux ] || [ ! -x compiler/shux ]; then
            echo "::error::compiler/shux not found or not executable (Build compiler step did not produce it)"
            exit 1
          fi
          if [ ! -f compiler/shux-c ] || [ ! -x compiler/shux-c ]; then
            echo "::error::compiler/shux-c not found (make all should produce shux-c alongside shux)"
            exit 1
          fi
      - name: Full CI test suite
        run: |
          chmod +x tests/run-ci-full-suite.sh
          ./tests/run-ci-full-suite.sh
        timeout-minutes: 170
      - name: Dump failure logs (on failure)
        if: failure()
        run: |
          tail -120 /tmp/build_bstrict.log 2>/dev/null || true
          tail -200 /tmp/run_shu1.log 2>/dev/null || true
          tail -200 /tmp/run_shu2.log 2>/dev/null || true
          for f in /tmp/shux_x.*.c; do [ -f "$f" ] || continue; echo "--- $f ---" && head -120 "$f"; done

  windows:
    name: Windows (MSYS2)
    runs-on: windows-latest
    timeout-minutes: 180
    env:
      CI: "1"
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Show job env (debug)
        run: |
          echo "Runner OS: $env:RUNNER_OS | Job: Windows"
          Get-Location
        shell: pwsh
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MSYS
          update: false
          install: make gcc diffutils python3 sed gawk zlib-devel brotli curl unzip
      - name: Build compiler (shux)
        run: make -C compiler OPT=1 all
        env:
          CC: gcc
      - name: Verify compiler/shux was built
        run: |
          if [ ! -f compiler/shux ] || [ ! -x compiler/shux ]; then
            echo "::error::compiler/shux not found or not executable (Build compiler step did not produce it)"
            exit 1
          fi
          if [ ! -f compiler/shux-c ] || [ ! -x compiler/shux-c ]; then
            echo "::error::compiler/shux-c not found (make all should produce shux-c alongside shux)"
            exit 1
          fi
      - name: B-hybrid shux_asm smoke (A-08)
        run: |
          chmod +x tests/run-bootstrap-bstrict-windows-gate.sh
          ./tests/run-bootstrap-bstrict-windows-gate.sh
        timeout-minutes: 90
      - name: Full CI test suite
        run: |
          chmod +x tests/run-ci-full-suite.sh
          ./tests/run-ci-full-suite.sh
        timeout-minutes: 120
      - name: Dump failure logs (on failure)
        if: failure()
        run: |
          echo "=== run_shu1.log (last 200 lines) ==="
          tail -200 /tmp/run_shu1.log 2>/dev/null || true
          echo "=== run_shu2.log (last 200 lines) ==="
          tail -200 /tmp/run_shu2.log 2>/dev/null || true
          for f in /tmp/shux_x.*.c; do [ -f "$f" ] || continue; echo "--- $f ---" && head -120 "$f"; done

  linux-option-asan:
    name: Linux (ASan repro run-option)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq liburing-dev zlib1g-dev libzstd-dev libbrotli-dev strace
      - name: Build std .o and shux (no ASan)
        run: make -C compiler clean && make -C compiler all
        env:
          CC: cc
      - name: Rebuild only compiler with ASan
        run: |
          rm -f compiler/src/main.o compiler/src/runtime.o compiler/src/preprocess.o \
            compiler/src/lexer/lexer.o compiler/src/ast/ast.o compiler/src/parser/parser.o \
            compiler/src/typeck/typeck.o compiler/src/codegen/codegen.o
          make -C compiler all \
            CFLAGS="-Wall -Wextra -I. -Iinclude -Isrc -O0 -g -fsanitize=address,undefined -fno-omit-frame-pointer"
        env:
          CC: cc
      - name: Reproduce run-option (capture ASan output)
        run: |
          ulimit -s 16384 2>/dev/null || true
          ./compiler/shux -L . tests/option/main.x -o /tmp/shux_option 2>&1 || true
          echo "--- exit code above ---"

  docker-distro:
    name: Docker (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [ alpine:3.23, debian:bookworm-slim ]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Show job env (debug)
        run: |
          echo "Job: Docker ${{ matrix.image }}"
          uname -a
          pwd
      - name: Build and full test in ${{ matrix.image }}
        timeout-minutes: 180
        run: |
          docker run --rm -e CI=1 -e SHUX_CI_FULL_SUITE=1 -e SHUX_CI_DOCKER=1 -e SHUX_CC_EXTRA="-std=gnu11" \
            -v "${{ github.workspace }}:/src" -w /src \
            ${{ matrix.image }} \
            sh -c '
              if command -v apk >/dev/null 2>&1; then
                apk add --no-cache build-base bash diffutils python3 gawk perl linux-headers liburing-dev zlib-dev brotli-dev sqlite-dev curl xz zig file
              else
                apt-get update -qq && apt-get install -y -qq build-essential bash diffutils python3 perl file liburing-dev zlib1g-dev libzstd-dev libbrotli-dev libsqlite3-dev curl xz-utils
              fi &&
              export SHUX_CC_EXTRA="-std=gnu11" &&
              make -C compiler clean &&
              make -C compiler OPT=1 all &&
              chmod +x tests/run-ci-full-suite.sh &&
              ./tests/run-ci-full-suite.sh
            '
