# Shulang CI: multi-platform build, C test suite, and self-host (.su) tests
# Linux (multi-version), Linux ARM64, macOS (multi-version), Windows, Docker multi-distro (Alpine/Debian).
# Build: shu (C compiler). 各平台测试：make test_c（C 路径全量）、make test_su（.su 自举 + run-all-su）、make bootstrap-verify。

name: CI

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ dev,main ]

jobs:
  linux:
    name: Linux (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-22.04, ubuntu-latest ]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install dependencies (liburing, zlib, brotli for std/io and std/compress)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq liburing-dev zlib1g-dev libbrotli-dev
      - name: Show job env (debug)
        run: |
          echo "Runner OS: $RUNNER_OS | ${{ matrix.os }}"
          uname -a
          pwd && ls -la
          which cc make 2>/dev/null || true
      - name: Build compiler (shu)
        run: make -C compiler OPT=1 all
        env:
          CC: cc
      - name: Verify compiler/shu was built
        run: |
          if [ ! -f compiler/shu ] || [ ! -x compiler/shu ]; then
            echo "::error::compiler/shu not found or not executable (Build compiler step did not produce it)"
            exit 1
          fi
      - name: Run C test suite (make test_c)
        run: make -C compiler test_c
        timeout-minutes: 20
      - name: Run .su test suite (make test_su)
        run: make -C compiler test_su
        timeout-minutes: 25
      - name: Bootstrap verify (shu1 -> shu2, both run run-all)
        run: make -C compiler bootstrap-verify
        timeout-minutes: 25
      - name: Dump failure logs (on failure)
        if: failure()
        run: |
          echo "=== run_shu1.log (last 200 lines) ==="
          tail -200 /tmp/run_shu1.log 2>/dev/null || true
          echo "=== run_shu2.log (last 200 lines) ==="
          tail -200 /tmp/run_shu2.log 2>/dev/null || true
          echo "=== Kept generated C (head 120 lines each) ==="
          for f in /tmp/shu_su.*.c; do
            [ -f "$f" ] || continue
            echo "--- $f ---" && head -120 "$f" && echo ""
          done

  linux-arm64:
    name: Linux (ARM64)
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install dependencies (liburing, zlib, brotli for std/io and std/compress)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq liburing-dev zlib1g-dev libbrotli-dev
      - name: Show job env (debug)
        run: |
          echo "Runner OS: $RUNNER_OS | Linux ARM64"
          uname -a && pwd && which cc make 2>/dev/null || true
      - name: Build compiler (shu)
        run: make -C compiler OPT=1 all
        env:
          CC: cc
      - name: Verify compiler/shu was built
        run: |
          if [ ! -f compiler/shu ] || [ ! -x compiler/shu ]; then
            echo "::error::compiler/shu not found or not executable (Build compiler step did not produce it)"
            exit 1
          fi
      - name: Run C test suite (make test_c)
        run: make -C compiler test_c
        timeout-minutes: 20
      - name: Run .su test suite (make test_su)
        run: make -C compiler test_su
        timeout-minutes: 25
      - name: Bootstrap verify (shu1 -> shu2, both run run-all)
        run: make -C compiler bootstrap-verify
        timeout-minutes: 25
      - name: Dump failure logs (on failure)
        if: failure()
        run: |
          echo "=== run_shu1.log (last 200 lines) ==="
          tail -200 /tmp/run_shu1.log 2>/dev/null || true
          echo "=== run_shu2.log (last 200 lines) ==="
          tail -200 /tmp/run_shu2.log 2>/dev/null || true
          for f in /tmp/shu_su.*.c; do [ -f "$f" ] || continue; echo "--- $f ---" && head -120 "$f"; done

  mac:
    name: macOS (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ macos-14, macos-latest ]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install dependencies (brotli for std/compress .br)
        run: brew list brotli >/dev/null 2>&1 || brew install brotli
      - name: Show job env (debug)
        run: |
          echo "Runner OS: $RUNNER_OS | ${{ matrix.os }}"
          uname -a && pwd && which cc make 2>/dev/null || true
      - name: Build compiler (shu)
        run: make -C compiler OPT=1 all
        env:
          CC: cc
      - name: Verify compiler/shu was built
        run: |
          if [ ! -f compiler/shu ] || [ ! -x compiler/shu ]; then
            echo "::error::compiler/shu not found or not executable (Build compiler step did not produce it)"
            exit 1
          fi
      - name: Run C test suite (make test_c)
        run: make -C compiler test_c
        timeout-minutes: 20
      - name: Run .su test suite (make test_su)
        run: make -C compiler test_su
        timeout-minutes: 25
      - name: Bootstrap verify (shu1 -> shu2, both run run-all)
        run: make -C compiler bootstrap-verify
        timeout-minutes: 25
      - name: Dump failure logs (on failure)
        if: failure()
        run: |
          echo "=== run_shu1.log (last 200 lines) ==="
          tail -200 /tmp/run_shu1.log 2>/dev/null || true
          echo "=== run_shu2.log (last 200 lines) ==="
          tail -200 /tmp/run_shu2.log 2>/dev/null || true
          for f in /tmp/shu_su.*.c; do [ -f "$f" ] || continue; echo "--- $f ---" && head -120 "$f"; done

  windows:
    name: Windows (MSYS2)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Show job env (debug)
        run: |
          echo "Runner OS: $env:RUNNER_OS | Job: Windows"
          Get-Location
        shell: pwsh
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MSYS
          update: true
          install: make gcc diffutils python3 sed gawk zlib-devel brotli
      - name: Build compiler (shu)
        run: make -C compiler OPT=1 all
        shell: msys2 {0}
        env:
          CC: gcc
      - name: Verify compiler/shu was built
        run: |
          if [ ! -f compiler/shu ] || [ ! -x compiler/shu ]; then
            echo "::error::compiler/shu not found or not executable (Build compiler step did not produce it)"
            exit 1
          fi
        shell: msys2 {0}
      - name: Run C test suite (make test_c)
        run: make -C compiler test_c
        shell: msys2 {0}
        timeout-minutes: 20
        env:
          CI: "1"
      - name: Run .su test suite (make test_su)
        run: make -C compiler test_su
        shell: msys2 {0}
        timeout-minutes: 25
        env:
          CI: "1"
      - name: Bootstrap verify (shu1 -> shu2, both run run-all)
        run: make -C compiler bootstrap-verify
        shell: msys2 {0}
        timeout-minutes: 25
        env:
          CI: "1"
      - name: Dump failure logs (on failure)
        if: failure()
        run: |
          echo "=== run_shu1.log (last 200 lines) ==="
          tail -200 /tmp/run_shu1.log 2>/dev/null || true
          echo "=== run_shu2.log (last 200 lines) ==="
          tail -200 /tmp/run_shu2.log 2>/dev/null || true
          for f in /tmp/shu_su.*.c; do [ -f "$f" ] || continue; echo "--- $f ---" && head -120 "$f"; done
        shell: msys2 {0}

  # 当 run-option 段错误时，用 ASan 构建并复现以获取崩溃位置（可选，不阻塞主流程）
  # 仅 shu 用 ASan 编译；std/*.o 用普通 CFLAGS，避免链接生成的 option 二进制时出现未定义 __asan_* 符号
  linux-option-asan:
    name: Linux (ASan repro run-option)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq liburing-dev zlib1g-dev libbrotli-dev
      - name: Build std .o and shu (no ASan)
        run: make -C compiler clean && make -C compiler all
        env:
          CC: cc
      - name: Rebuild only compiler with ASan
        run: |
          rm -f compiler/src/main.o compiler/src/runtime.o compiler/src/preprocess.o \
            compiler/src/lexer/lexer.o compiler/src/ast/ast.o compiler/src/parser/parser.o \
            compiler/src/typeck/typeck.o compiler/src/codegen/codegen.o
          make -C compiler all \
            CFLAGS="-Wall -Wextra -I. -Iinclude -Isrc -O0 -g -fsanitize=address,undefined -fno-omit-frame-pointer"
        env:
          CC: cc
      - name: Reproduce run-option (capture ASan output)
        run: |
          ulimit -s 16384 2>/dev/null || true
          ./compiler/shu -L . tests/option/main.su -o /tmp/shu_option 2>&1 || true
          echo "--- exit code above ---"

  docker-distro:
    name: Docker (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [ alpine:3.23, debian:bookworm-slim ]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Show job env (debug)
        run: |
          echo "Job: Docker ${{ matrix.image }}"
          uname -a
          pwd
      - name: Build and test in ${{ matrix.image }}
        timeout-minutes: 60
        run: |
          docker run --rm -e CI=1 -e SHU_CC_EXTRA="-std=gnu11" \
            -v "${{ github.workspace }}:/src" -w /src \
            ${{ matrix.image }} \
            sh -c '
              if command -v apk >/dev/null 2>&1; then
                apk add --no-cache build-base bash diffutils python3 gawk linux-headers liburing-dev zlib-dev brotli-dev
              else
                apt-get update -qq && apt-get install -y -qq build-essential bash diffutils python3 liburing-dev zlib1g-dev libbrotli-dev
              fi &&
              export SHU_CC_EXTRA="-std=gnu11" &&
              make -C compiler clean &&
              make -C compiler OPT=1 all &&
              make -C compiler test_c &&
              make -C compiler test_su &&
              make -C compiler bootstrap-verify
            '
