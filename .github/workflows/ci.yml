  windows:
    name: Windows (MSYS2)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Show job env (debug)
        run: |
          echo "Runner OS: $env:RUNNER_OS | Job: Windows"
          Get-Location
        shell: pwsh
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MSYS
          update: true
          install: make gcc diffutils python3 sed gawk zlib-devel brotli
      - name: Build compiler (shu)
        run: make -C compiler OPT=1 all
        shell: msys2 {0}
        env:
          CC: gcc
      - name: Verify compiler/shu was built
        run: |
          if [ ! -f compiler/shu ] || [ ! -x compiler/shu ]; then
            echo "::error::compiler/shu not found or not executable (Build compiler step did not produce it)"
            exit 1
          fi
          if [ ! -f compiler/shu-c ] || [ ! -x compiler/shu-c ]; then
            echo "::error::compiler/shu-c not found (make all should produce shu-c alongside shu)"
            exit 1
          fi
        shell: msys2 {0}
      - name: IO-A6 IOCP smoke + pipe batch perf (Windows)
        run: |
          chmod +x tests/run-iocp-gate.sh tests/run-perf-iocp.sh
          SHU_IOCP_RUNS=1 SHU_IOCP_BENCH_ROUNDS=32768 ./tests/run-iocp-gate.sh --perf | tee /tmp/iocp_gate.log
        shell: msys2 {0}
        timeout-minutes: 5
        env:
          CI: "1"
      - name: Run C test suite (make test_c)
        run: make -C compiler test_c
        shell: msys2 {0}
        timeout-minutes: 45
        env:
          CI: "1"
      - name: Run .su test suite (make test_su)
        run: make -C compiler test_su
        shell: msys2 {0}
        timeout-minutes: 25
        env:
          CI: "1"
      - name: Goal 2 asm build script (build_shu_asm.sh)
        run: cd compiler && SHU=./shu ./scripts/build_shu_asm.sh
        shell: msys2 {0}
        timeout-minutes: 12
        env:
          CI: "1"
      - name: Asm object code section sizes (Mach-O __text / ELF .text)
        run: cd compiler && SHU=./shu ./scripts/check_asm_o_quality.sh
        shell: msys2 {0}
        timeout-minutes: 3
        env:
          CI: "1"
      - name: S2 typeck.o gate (P3)
        run: |
          chmod +x tests/run-s2-typeck-gate.sh tests/run-s2-typeck-o-parity.sh
          SHU_S2_REQUIRE_TYPECK_O=1 SHU_S2_FAIL_ON_REGRESSION=1 ./tests/run-s2-typeck-gate.sh | tee /tmp/s2_typeck_gate.log
          grep -q 's2 typeck gate OK' /tmp/s2_typeck_gate.log
          SHU_S2_FAIL_ON_PARITY=1 ./tests/run-s2-typeck-o-parity.sh | tee /tmp/s2_typeck_parity.log
          grep -q 's2 parity OK' /tmp/s2_typeck_parity.log
        shell: msys2 {0}
        timeout-minutes: 3
        env:
          CI: "1"
      - name: Bootstrap verify (shu1 -> shu2, both run run-all)
        run: make -C compiler bootstrap-verify
        shell: msys2 {0}
        timeout-minutes: 25
        env:
          CI: "1"
      - name: Dump failure logs (on failure)
        if: failure()
        run: |
          echo "=== run_shu1.log (last 200 lines) ==="
          tail -200 /tmp/run_shu1.log 2>/dev/null || true
          echo "=== run_shu2.log (last 200 lines) ==="
          tail -200 /tmp/run_shu2.log 2>/dev/null || true
          for f in /tmp/shu_su.*.c; do [ -f "$f" ] || continue; echo "--- $f ---" && head -120 "$f"; done
        shell: msys2 {0}

  # 当 run-option 段错误时，用 ASan 构建并复现以获取崩溃位置（可选，不阻塞主流程）
  # 仅 shu 用 ASan 编译；std/*.o 用普通 CFLAGS，避免链接生成的 option 二进制时出现未定义 __asan_* 符号
  linux-option-asan:
    name: Linux (ASan repro run-option)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq liburing-dev zlib1g-dev libbrotli-dev strace
      - name: Build std .o and shu (no ASan)
        run: make -C compiler clean && make -C compiler all
        env:
          CC: cc
      - name: Rebuild only compiler with ASan
        run: |
          rm -f compiler/src/main.o compiler/src/runtime.o compiler/src/preprocess.o \
            compiler/src/lexer/lexer.o compiler/src/ast/ast.o compiler/src/parser/parser.o \
            compiler/src/typeck/typeck.o compiler/src/codegen/codegen.o
          make -C compiler all \
            CFLAGS="-Wall -Wextra -I. -Iinclude -Isrc -O0 -g -fsanitize=address,undefined -fno-omit-frame-pointer"
        env:
          CC: cc
      - name: Reproduce run-option (capture ASan output)
        run: |
          ulimit -s 16384 2>/dev/null || true
          ./compiler/shu -L . tests/option/main.su -o /tmp/shu_option 2>&1 || true
          echo "--- exit code above ---"

  docker-distro:
    name: Docker (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [ alpine:3.23, debian:bookworm-slim ]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Show job env (debug)
        run: |
          echo "Job: Docker ${{ matrix.image }}"
          uname -a
          pwd
      - name: Build and test in ${{ matrix.image }}
        timeout-minutes: 60
        run: |
          docker run --rm -e CI=1 -e SHU_CC_EXTRA="-std=gnu11" \
            -v "${{ github.workspace }}:/src" -w /src \
            ${{ matrix.image }} \
            sh -c '
              if command -v apk >/dev/null 2>&1; then
                apk add --no-cache build-base bash diffutils python3 gawk perl linux-headers liburing-dev zlib-dev brotli-dev
              else
                apt-get update -qq && apt-get install -y -qq build-essential bash diffutils python3 perl liburing-dev zlib1g-dev libbrotli-dev
              fi &&
              export SHU_CC_EXTRA="-std=gnu11" &&
              make -C compiler clean &&
              make -C compiler OPT=1 all &&
              make -C compiler test_c &&
              make -C compiler test_su &&
              make -C compiler bootstrap-verify &&
              chmod +x tests/run-freestanding-hello.sh &&
              SHU=./compiler/shu_asm ./tests/run-freestanding-hello.sh 2>&1 | tee /tmp/freestanding_docker.log &&
              if grep -q "musl crt0 syscall link smoke" /tmp/freestanding_docker.log; then
                echo "docker-distro: WARN freestanding used musl fallback (Alpine 目标：SHU=shu_asm 仍不可用时回退)"
              elif grep -q "run-freestanding-hello OK" /tmp/freestanding_docker.log; then
                echo "docker-distro: freestanding full asm OK (SHU=shu_asm -freestanding -backend asm)"
              fi
            '
