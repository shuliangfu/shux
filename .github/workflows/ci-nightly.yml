# ENG-003：Linux / macOS / Windows 核心链路夜跑
# PR 矩阵见 ci.yml；本 workflow 每日 schedule + 手动 workflow_dispatch。
# 统一入口：tests/run-ci-full-suite.sh（Tier P 全平台 + Tier B；Tier A 按平台 lite/full）。
#
# TEMP: schedule 已暂停（bootstrap-gold 调试中）；手动 workflow_dispatch 仍可用。

name: CI Nightly

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 2 * * *'

jobs:
  nightly-linux:
    name: Nightly Linux (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      CI: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq liburing-dev zlib1g-dev libzstd-dev libbrotli-dev strace curl xz-utils
      - name: Build compiler
        run: make -C compiler OPT=1 all
        env:
          CC: cc
      - name: Full CI test suite
        run: |
          chmod +x tests/run-ci-full-suite.sh
          ./tests/run-ci-full-suite.sh
        timeout-minutes: 170
      - name: G-FFI-5 release CI (LANG-007 + business)
        run: |
          chmod +x tests/run-g-ffi-5-release-ci-gate.sh
          SHUX_G_FFI5_FAIL=1 ./tests/run-g-ffi-5-release-ci-gate.sh
        timeout-minutes: 30
      - name: D-03 Stage2 hash (if stage products exist)
        run: |
          chmod +x tests/run-d03-stage2-hash-gate.sh
          SHUX_D03_FAIL=0 ./tests/run-d03-stage2-hash-gate.sh
        timeout-minutes: 15
      - name: G-05 c08 policy
        run: |
          chmod +x tests/run-c08-build-x-gate.sh
          ./tests/run-c08-build-x-gate.sh
      - name: SAFE-005 leak nightly (Linux ASAN)
        run: |
          chmod +x tests/run-safe-leak-nightly.sh tests/lib/safe-leak.sh
          SHUX_LEAK_PROBE=1 ./tests/run-safe-leak-nightly.sh | tee /tmp/safe_leak_nightly.log
          grep -q 'SHUX_LEAK_NIGHTLY' /tmp/safe_leak_nightly.log
        timeout-minutes: 15
      - name: SAFE-006 race detect experimental (Linux TSAN)
        run: |
          chmod +x tests/run-safe-race-detect.sh tests/lib/safe-race.sh
          SHUX_RACE_PROBE=1 ./tests/run-safe-race-detect.sh | tee /tmp/safe_race_detect.log
          grep -q 'SHUX_RACE_DETECT' /tmp/safe_race_detect.log
        timeout-minutes: 10
      - name: ENG-007 security audit (Linux periodic)
        run: |
          chmod +x tests/run-eng-security-audit.sh tests/lib/eng-security-audit.sh
          SHUX_SEC_AUDIT_PROBE=1 ./tests/run-eng-security-audit.sh | tee /tmp/eng_security_audit.log
          grep -q 'SHUX_SECURITY_AUDIT' /tmp/eng_security_audit.log
        timeout-minutes: 10
      - name: PERF-169 weekly perf baseline (Linux)
        run: |
          chmod +x tests/run-perf-weekly-gate.sh
          ./tests/run-perf-weekly-gate.sh | tee /tmp/perf_weekly_nightly.log
          grep -q 'perf-weekly gate OK' /tmp/perf_weekly_nightly.log
        timeout-minutes: 30

  nightly-macos:
    name: Nightly macOS
    runs-on: macos-latest
    timeout-minutes: 180
    env:
      CI: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install dependencies
        run: brew list brotli >/dev/null 2>&1 || brew install brotli; brew list zig >/dev/null 2>&1 || brew install zig
      - name: Build compiler
        run: make -C compiler OPT=1 all
        env:
          CC: cc
      - name: Full CI test suite
        run: |
          chmod +x tests/run-ci-full-suite.sh
          ./tests/run-ci-full-suite.sh
        timeout-minutes: 170

  nightly-windows:
    name: Nightly Windows (MSYS2)
    runs-on: windows-latest
    timeout-minutes: 180
    env:
      CI: "1"
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MSYS
          update: false
          install: make gcc diffutils python3 sed gawk zlib-devel brotli curl unzip
      - name: Build compiler
        run: make -C compiler OPT=1 all
        env:
          CC: gcc
      - name: Full CI test suite
        run: |
          chmod +x tests/run-ci-full-suite.sh
          ./tests/run-ci-full-suite.sh
        timeout-minutes: 120
